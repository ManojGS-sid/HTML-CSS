<style>
 .subscribe-button { 
    background-color: rgb(200, 0, 0);
    color:aliceblue;
    border: none;
    height: 36px;
    width: 105px;
    border-radius: 2px;
    cursor: pointer;
    margin: 8px;
    transition: opacity 0.15s ease;

}

.subscribe-button:hover {
    opacity: 0.8;
}

.subscribe-button:active {
    opacity: 0.4;
}
.join-button { 
    background-color: rgb(255, 255, 255);
    color:rgb(47, 147, 234);
    border-color:rgb(47, 147, 234);
    border-style:solid ;
    border-radius: 2px;
    cursor: pointer;
    padding-right: 10px;
    PADDING-LEFT: 10PX;
    padding-top: 5px;
    padding-bottom: 5px;
    transition: background-color 0.3s ease;
}

.join-button:hover {
    background-color:rgb(47, 147, 234); 
    color:rgb(255, 255, 255);
}

.join-button:active {
    opacity: 0.4;
}

.tweet-button { 
    background-color: rgb(10, 147, 244);
    color: white;
    border: none;
    height: 36px;
    width: 75px;
    border-radius: 22px;
    font-weight: bold;
    font-size: 15px;
    cursor: pointer;
    margin: 8px;
    transition: box-shadow 0.3s ease;
}

.tweet-button:hover {
    box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.3);
}

.addtocart-button { 
    background-color: rgb(244, 248, 0);
    color:rgb(0, 0, 0);
    border-color:rgb(244, 248, 0);
    border-style:solid ;
    height: 36px;
    width: 180px;
    border-radius: 18px;
    cursor: pointer;
    margin-left: 10px;
}
</style>

<button class="subscribe-button">
    SUBSCRIBE 
</button>

<button class="join-button">
    JOIN MY CHANNEL 
</button>

</button>

     ADD TO CART
